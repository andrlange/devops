apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: garage
  namespace: garage
spec:
  serviceName: garage
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: garage
  template:
    metadata:
      labels:
        app.kubernetes.io/name: garage
      annotations:
        checksum/config: "garage-config"
    spec:
      imagePullSecrets:
        - name: artifact-keeper-pull
      terminationGracePeriodSeconds: 30
      containers:
        - name: garage
          image: artifactory.cfapps.cool/docker-local/dxflrs/garage:v2.2.0-arm64
          imagePullPolicy: IfNotPresent
          ports:
            - name: s3-api
              containerPort: 3900
              protocol: TCP
            - name: rpc
              containerPort: 3901
              protocol: TCP
            - name: web
              containerPort: 3902
              protocol: TCP
            - name: admin
              containerPort: 3903
              protocol: TCP
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          volumeMounts:
            - name: garage-config
              mountPath: /etc/garage.toml
              subPath: garage.toml
              readOnly: true
            - name: garage-data
              mountPath: /var/lib/garage/data
            - name: garage-meta
              mountPath: /var/lib/garage/meta
          # Note: Probes use v2 health endpoint. Garage returns 503 until
          # node layout is configured, so install.sh removes probes temporarily
          # during initial setup and re-adds them after layout configuration.
          livenessProbe:
            httpGet:
              path: /v2/GetClusterHealth
              port: admin
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 5
          readinessProbe:
            httpGet:
              path: /v2/GetClusterHealth
              port: admin
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 5
      volumes:
        - name: garage-config
          configMap:
            name: garage-config
  volumeClaimTemplates:
    - metadata:
        name: garage-data
      spec:
        accessModes:
          - ReadWriteOnce
        storageClassName: local-path
        resources:
          requests:
            storage: 100Gi
    - metadata:
        name: garage-meta
      spec:
        accessModes:
          - ReadWriteOnce
        storageClassName: local-path
        resources:
          requests:
            storage: 1Gi
