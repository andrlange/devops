apiVersion: v1
kind: ConfigMap
metadata:
  name: garage-config
  namespace: garage
data:
  garage.toml: |
    metadata_dir = "/var/lib/garage/meta"
    data_dir = "/var/lib/garage/data"
    db_engine = "lmdb"

    replication_factor = 1
    rpc_bind_addr = "[::]:3901"
    rpc_secret = "0e0eb7e3720bc1d6cb9c9ceb073c56270a31493db17b0d9b57dd2572d62d9d71"

    [s3_api]
    s3_region = "garage"
    api_bind_addr = "[::]:3900"
    root_domain = ".s3.development.cfapps.cool"

    [s3_web]
    bind_addr = "[::]:3902"
    root_domain = ".web.development.cfapps.cool"

    [admin]
    api_bind_addr = "[::]:3903"
    admin_token = "GARAGE_ADMIN_TOKEN_PLACEHOLDER"
