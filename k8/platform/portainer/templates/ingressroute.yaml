apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: portainer
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: portainer
    app.kubernetes.io/instance: {{ .Release.Name }}
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`portainer.{{ .Values.domain | default "development.cfapps.cool" }}`)
      kind: Rule
      services:
        - name: portainer
          port: 9000
  tls: {}
