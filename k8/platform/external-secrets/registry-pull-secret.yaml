apiVersion: external-secrets.io/v1
kind: ClusterExternalSecret
metadata:
  name: artifact-keeper-pull
spec:
  namespaceSelectors:
    - matchLabels: {}
  externalSecretSpec:
    refreshInterval: 1h
    secretStoreRef:
      kind: ClusterSecretStore
      name: openbao
    target:
      name: artifact-keeper-pull
      template:
        type: kubernetes.io/dockerconfigjson
        data:
          .dockerconfigjson: |
            {"auths":{"{{ .server }}":{"username":"{{ .username }}","password":"{{ .password }}"}}}
    data:
      - secretKey: server
        remoteRef:
          key: secret/k8s/registry
          property: server
      - secretKey: username
        remoteRef:
          key: secret/k8s/registry
          property: username
      - secretKey: password
        remoteRef:
          key: secret/k8s/registry
          property: password
