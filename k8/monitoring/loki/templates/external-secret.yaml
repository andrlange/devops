apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: loki-s3-credentials
  namespace: {{ .Release.Namespace }}
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: openbao
  target:
    name: loki-s3-credentials
  data:
    - secretKey: access_key
      remoteRef:
        key: secret/garage/loki
        property: access_key
    - secretKey: secret_key
      remoteRef:
        key: secret/garage/loki
        property: secret_key
