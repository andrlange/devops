apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: mimir-s3-credentials
  namespace: mimir
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: openbao
  target:
    name: mimir-s3-credentials
  data:
    - secretKey: MIMIR_S3_ACCESS_KEY
      remoteRef:
        key: secret/garage/mimir
        property: access_key
    - secretKey: MIMIR_S3_SECRET_KEY
      remoteRef:
        key: secret/garage/mimir
        property: secret_key
