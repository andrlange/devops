apiVersion: v1
kind: ConfigMap
metadata:
  name: mimir-config
  namespace: mimir
data:
  mimir.yaml: |
    multitenancy_enabled: false

    server:
      http_listen_port: 8080
      grpc_listen_port: 9095

    common:
      storage:
        backend: s3
        s3:
          endpoint: garage.garage.svc:3900
          bucket_name: mimir-blocks
          region: garage
          insecure: true
          access_key_id: ${MIMIR_S3_ACCESS_KEY}
          secret_access_key: ${MIMIR_S3_SECRET_KEY}

    blocks_storage:
      backend: s3
      tsdb:
        dir: /data/tsdb

    compactor:
      data_dir: /data/compactor

    distributor:
      ring:
        instance_addr: 127.0.0.1
        kvstore:
          store: memberlist

    ingester:
      ring:
        instance_addr: 127.0.0.1
        kvstore:
          store: memberlist
        replication_factor: 1

    store_gateway:
      sharding_ring:
        replication_factor: 1

    ruler:
      enable_api: false

    ruler_storage:
      backend: filesystem
      filesystem:
        dir: /data/ruler

    alertmanager_storage:
      backend: filesystem
      filesystem:
        dir: /data/alertmanager
