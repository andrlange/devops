# Lima VM configuration for K3s single-node cluster
# Platform: Apple Silicon (M4+, 64GB+)
# Network: vzNAT (shared) for MetalLB L2 compatibility
#
# Usage:
#   limactl create --name=k3s-server k8/bootstrap/lima.yaml
#   limactl start k3s-server
#   limactl shell k3s-server

vmType: vz
plain: true

# Lima 2.x: rosetta moved under vmOpts.vz (top-level 'rosetta' is deprecated)
vmOpts:
  vz:
    rosetta:
      enabled: true
      binfmt: true

cpus: 8
memory: 48GiB
disk: 200GiB

images:
  - location: "https://cloud-images.ubuntu.com/releases/24.04/release/ubuntu-24.04-server-cloudimg-arm64.img"
    arch: "aarch64"

networks:
  - vzNAT: true

ssh:
  forwardAgent: true

mounts:
  - location: "/Users/andreas/development/devops/k8"
    mountPoint: "/mnt/k8"
    writable: false

containerd:
  system: false
  user: false

provision:
  - mode: system
    script: |
      #!/bin/bash
      set -euo pipefail

      # Prevent interactive prompts during package installation
      export DEBIAN_FRONTEND=noninteractive

      # Create persistent data directory for PVs and application state
      mkdir -p /data/persistent
      chmod 755 /data/persistent

      # Update package index and install required tools
      apt-get update -qq
      apt-get install -y -qq \
        curl \
        jq \
        open-iscsi \
        nfs-common \
        bash-completion \
        ca-certificates \
        gnupg \
        apt-transport-https

      # Enable and start iscsid (required for certain CSI storage drivers)
      systemctl enable --now iscsid

      # Load kernel modules required for MetalLB and networking
      cat > /etc/modules-load.d/k8s.conf <<EOF
      br_netfilter
      ip_vs
      ip_vs_rr
      ip_vs_wrr
      ip_vs_sh
      nf_conntrack
      EOF

      modprobe br_netfilter
      modprobe ip_vs
      modprobe ip_vs_rr
      modprobe ip_vs_wrr
      modprobe ip_vs_sh
      modprobe nf_conntrack

      # Configure sysctl for Kubernetes networking
      cat > /etc/sysctl.d/99-k8s.conf <<EOF
      net.bridge.bridge-nf-call-iptables  = 1
      net.bridge.bridge-nf-call-ip6tables = 1
      net.ipv4.ip_forward                 = 1
      net.ipv4.conf.all.forwarding        = 1
      fs.inotify.max_user_instances       = 1024
      fs.inotify.max_user_watches         = 524288
      EOF

      sysctl --system --quiet

      echo "[lima-provision] Base system provisioning complete."
