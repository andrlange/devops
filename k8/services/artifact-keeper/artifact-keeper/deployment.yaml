apiVersion: apps/v1
kind: Deployment
metadata:
  name: artifact-keeper
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: artifact-keeper
      app.kubernetes.io/component: backend
  template:
    metadata:
      labels:
        app.kubernetes.io/name: artifact-keeper
        app.kubernetes.io/component: backend
        app.kubernetes.io/part-of: artifact-keeper
    spec:
      imagePullSecrets:
        - name: artifact-keeper-pull
      initContainers:
        - name: wait-for-postgres
          image: artifactory.cfapps.cool/docker-local/postgres:17.9-arm64
          command:
            - sh
            - -c
            - |
              until pg_isready -h postgres -p 5432 -U "$POSTGRES_USER"; do
                echo "Waiting for PostgreSQL..."
                sleep 2
              done
          envFrom:
            - secretRef:
                name: postgres-credentials
        - name: wait-for-meilisearch
          image: artifactory.cfapps.cool/docker-local/getmeili/meilisearch:v1.39.0-arm64
          command:
            - sh
            - -c
            - |
              until wget --no-verbose --spider http://meilisearch:7700/health 2>/dev/null; do
                echo "Waiting for Meilisearch..."
                sleep 2
              done
      containers:
        - name: artifact-keeper
          image: artifactory.cfapps.cool/docker-local/andrlange/artifact-keeper-backend:v1.1.0-rc.8-patched-arm64
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          env:
            # Build DATABASE_URL from individual secret values
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: postgres-credentials
                  key: POSTGRES_USER
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgres-credentials
                  key: POSTGRES_PASSWORD
            - name: POSTGRES_DB
              valueFrom:
                secretKeyRef:
                  name: postgres-credentials
                  key: POSTGRES_DB
            - name: DATABASE_URL
              value: postgresql://$(POSTGRES_USER):$(POSTGRES_PASSWORD)@postgres:5432/$(POSTGRES_DB)
            # Meilisearch
            - name: MEILISEARCH_URL
              valueFrom:
                configMapKeyRef:
                  name: artifact-keeper-config
                  key: MEILISEARCH_URL
            - name: MEILISEARCH_API_KEY
              valueFrom:
                secretKeyRef:
                  name: meilisearch-credentials
                  key: MEILI_MASTER_KEY
            # S3 storage (Garage)
            - name: S3_ENDPOINT
              valueFrom:
                configMapKeyRef:
                  name: artifact-keeper-config
                  key: S3_ENDPOINT
            - name: S3_BUCKET
              valueFrom:
                configMapKeyRef:
                  name: artifact-keeper-config
                  key: S3_BUCKET
            - name: S3_REGION
              valueFrom:
                configMapKeyRef:
                  name: artifact-keeper-config
                  key: S3_REGION
            - name: S3_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: garage-s3-credentials
                  key: S3_ACCESS_KEY
            - name: S3_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: garage-s3-credentials
                  key: S3_SECRET_KEY
            # Storage paths
            - name: STORAGE_PATH
              valueFrom:
                configMapKeyRef:
                  name: artifact-keeper-config
                  key: STORAGE_PATH
            - name: BACKUP_PATH
              valueFrom:
                configMapKeyRef:
                  name: artifact-keeper-config
                  key: BACKUP_PATH
          envFrom:
            - secretRef:
                name: artifact-keeper-credentials
          volumeMounts:
            - name: storage
              mountPath: /data/storage
            - name: backups
              mountPath: /data/backups
          resources:
            requests:
              memory: 1Gi
              cpu: 250m
            limits:
              memory: 4Gi
              cpu: "1"
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 5
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 5
      volumes:
        - name: storage
          emptyDir: {}
        - name: backups
          emptyDir: {}
