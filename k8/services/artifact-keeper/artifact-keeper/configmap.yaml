apiVersion: v1
kind: ConfigMap
metadata:
  name: artifact-keeper-config
data:
  # PostgreSQL connection (credentials injected via secret env vars)
  DATABASE_HOST: postgres
  DATABASE_PORT: "5432"

  # OpenSearch (search backend, replaced Meilisearch in v1.2.0)
  OPENSEARCH_URL: http://opensearch:9200

  # S3 Storage (Garage) — v1.2.0 requires STORAGE_BACKEND explicitly (defaults to filesystem)
  STORAGE_BACKEND: s3
  S3_ENDPOINT: http://garage.garage.svc:3900
  S3_BUCKET: artifacts
  S3_REGION: garage
  # Disable S3 idle-connection reuse: AK's 90s pool idle-timeout outlives Garage's
  # server-side keep-alive, so reused connections go stale → intermittent
  # "storage file missing" reads with no retry. 0 = fresh connection per request.
  S3_POOL_MAX_IDLE_PER_HOST: "0"

  # Security Scanning
  TRIVY_URL: http://trivy:8090
  SCAN_WORKSPACE_PATH: /scan-workspace

  # Storage paths
  STORAGE_PATH: /data/storage
  BACKUP_PATH: /data/backups
