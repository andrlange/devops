apiVersion: v1
kind: ConfigMap
metadata:
  name: artifact-keeper-config
data:
  # PostgreSQL connection (credentials injected via secret env vars)
  DATABASE_HOST: postgres
  DATABASE_PORT: "5432"

  # Meilisearch
  MEILISEARCH_URL: http://meilisearch:7700

  # S3 Storage (Garage)
  S3_ENDPOINT: http://garage.garage.svc:3900
  S3_BUCKET: artifacts
  S3_REGION: garage

  # Security Scanning
  TRIVY_URL: http://trivy:8090
  SCAN_WORKSPACE_PATH: /scan-workspace

  # Storage paths
  STORAGE_PATH: /data/storage
  BACKUP_PATH: /data/backups
