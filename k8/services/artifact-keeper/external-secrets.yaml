---
# PostgreSQL credentials
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: postgres-credentials
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: openbao
  target:
    name: postgres-credentials
  data:
    - secretKey: POSTGRES_USER
      remoteRef:
        key: secret/artifact-keeper/postgres
        property: username
    - secretKey: POSTGRES_PASSWORD
      remoteRef:
        key: secret/artifact-keeper/postgres
        property: password
    - secretKey: POSTGRES_DB
      remoteRef:
        key: secret/artifact-keeper/postgres
        property: database
---
# artifact-keeper application secrets
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: artifact-keeper-credentials
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: openbao
  target:
    name: artifact-keeper-credentials
  data:
    - secretKey: JWT_SECRET
      remoteRef:
        key: secret/artifact-keeper/app
        property: jwt_secret
    - secretKey: ADMIN_PASSWORD
      remoteRef:
        key: secret/artifact-keeper/app
        property: admin_password
    - secretKey: MIGRATION_ENCRYPTION_KEY
      remoteRef:
        key: secret/artifact-keeper/app
        property: migration_encryption_key
---
# Garage S3 credentials for artifacts bucket
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: garage-s3-credentials
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: openbao
  target:
    name: garage-s3-credentials
  data:
    - secretKey: S3_ACCESS_KEY
      remoteRef:
        key: secret/garage/artifacts
        property: access_key
    - secretKey: S3_SECRET_KEY
      remoteRef:
        key: secret/garage/artifacts
        property: secret_key
