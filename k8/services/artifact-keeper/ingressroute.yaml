apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: artifact-keeper
spec:
  entryPoints:
    - websecure
  routes:
    # API backend routes
    - match: Host(`artifacts.development.cfapps.cool`) && PathPrefix(`/api/`)
      kind: Rule
      services:
        - name: artifact-keeper
          port: 8080
    - match: Host(`artifacts.development.cfapps.cool`) && PathPrefix(`/v2/`)
      kind: Rule
      services:
        - name: artifact-keeper
          port: 8080
    - match: Host(`artifacts.development.cfapps.cool`) && PathPrefix(`/helm/`)
      kind: Rule
      services:
        - name: artifact-keeper
          port: 8080
    - match: Host(`artifacts.development.cfapps.cool`) && PathPrefix(`/generic/`)
      kind: Rule
      services:
        - name: artifact-keeper
          port: 8080
    - match: Host(`artifacts.development.cfapps.cool`) && PathPrefix(`/health`)
      kind: Rule
      services:
        - name: artifact-keeper
          port: 8080
    - match: Host(`artifacts.development.cfapps.cool`) && PathPrefix(`/metrics`)
      kind: Rule
      services:
        - name: artifact-keeper
          port: 8080
    # Web UI (catch-all)
    - match: Host(`artifacts.development.cfapps.cool`)
      kind: Rule
      priority: 1
      services:
        - name: artifact-keeper-web
          port: 3000
  tls: {}
