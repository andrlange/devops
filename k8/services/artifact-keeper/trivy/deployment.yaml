apiVersion: apps/v1
kind: Deployment
metadata:
  name: trivy
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: trivy
      app.kubernetes.io/component: scanner
  template:
    metadata:
      labels:
        app.kubernetes.io/name: trivy
        app.kubernetes.io/component: scanner
        app.kubernetes.io/part-of: artifact-keeper
    spec:
      imagePullSecrets:
        - name: artifact-keeper-pull
      containers:
        - name: trivy
          image: artifactory.cfapps.cool/docker-local/aquasecurity/trivy:0.71.0-arm64
          args:
            - server
            - --listen
            - "0.0.0.0:8090"
          ports:
            - name: http
              containerPort: 8090
              protocol: TCP
          volumeMounts:
            - name: cache
              mountPath: /root/.cache/trivy
          resources:
            requests:
              memory: 256Mi
              cpu: 100m
            limits:
              memory: 1Gi
              cpu: 500m
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 15
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 30
            periodSeconds: 30
      volumes:
        - name: cache
          emptyDir:
            sizeLimit: 2Gi
