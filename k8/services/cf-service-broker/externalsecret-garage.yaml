apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: garage-admin-token
  namespace: cf-services
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: openbao
  target:
    name: garage-admin-token
  data:
    - secretKey: token
      remoteRef:
        key: secret/garage/admin-token
        property: token
