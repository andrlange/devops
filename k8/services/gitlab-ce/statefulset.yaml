apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: gitlab
spec:
  serviceName: gitlab
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: gitlab
      app.kubernetes.io/component: server
  template:
    metadata:
      labels:
        app.kubernetes.io/name: gitlab
        app.kubernetes.io/component: server
        app.kubernetes.io/part-of: gitlab
    spec:
      imagePullSecrets:
        - name: artifact-keeper-pull
      containers:
        - name: gitlab
          image: artifactory.cfapps.cool/docker-local/gitlab/gitlab-ce:18.10.0-ce.0-arm64
          ports:
            - name: http
              containerPort: 80
              protocol: TCP
            - name: ssh
              containerPort: 22
              protocol: TCP
          env:
            - name: GITLAB_OMNIBUS_CONFIG
              valueFrom:
                configMapKeyRef:
                  name: gitlab-config
                  key: gitlab.rb
            - name: GITLAB_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: gitlab-admin-credentials
                  key: GITLAB_ROOT_PASSWORD
          volumeMounts:
            - name: data
              mountPath: /var/opt/gitlab
            - name: config
              mountPath: /etc/gitlab
            - name: logs
              mountPath: /var/log/gitlab
          resources:
            requests:
              memory: 4Gi
              cpu: 1000m
            limits:
              memory: 10Gi
              cpu: 4000m
          livenessProbe:
            exec:
              command:
                - curl
                - -sf
                - http://localhost/-/liveness
            initialDelaySeconds: 300
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 5
          readinessProbe:
            exec:
              command:
                - curl
                - -sf
                - http://localhost/-/readiness
            initialDelaySeconds: 30
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 10
          startupProbe:
            exec:
              command:
                - curl
                - -sf
                - http://localhost/-/liveness
            initialDelaySeconds: 120
            periodSeconds: 15
            timeoutSeconds: 10
            failureThreshold: 80
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: gitlab-data
        - name: config
          persistentVolumeClaim:
            claimName: gitlab-config
        - name: logs
          persistentVolumeClaim:
            claimName: gitlab-logs
