<!DOCTYPE html>
<html lang="en" data-bs-theme="dark" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>kappman — Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link th:href="@{/css/kappman.css}" rel="stylesheet">
</head>
<body class="d-flex align-items-center justify-content-center" style="min-height: 100vh;">
    <div class="card login-card" style="width: 400px;">
        <div class="card-body p-4">
            <div class="text-center mb-4">
                <div class="login-logo mb-2">&#9752;</div>
                <h4 class="text-spring-green">kappman</h4>
                <p class="text-muted small">Korifi App Manager <span th:text="${appVersion}"></span></p>
            </div>

            <div th:if="${param.error}" class="alert alert-danger alert-sm py-2" role="alert">
                <i class="bi bi-exclamation-triangle me-1"></i> Invalid username or password
            </div>
            <div th:if="${param.logout}" class="alert alert-success alert-sm py-2" role="alert">
                <i class="bi bi-check-circle me-1"></i> Successfully logged out
            </div>

            <form th:action="@{/login}" method="post">
                <div class="mb-3">
                    <label for="username" class="form-label">Username</label>
                    <input type="text" class="form-control" id="username" name="username" autofocus required>
                </div>
                <div class="mb-3">
                    <label for="password" class="form-label">Password</label>
                    <input type="password" class="form-control" id="password" name="password" required>
                </div>
                <div class="mb-3 form-check">
                    <input type="checkbox" class="form-check-input" id="remember-me" name="remember-me">
                    <label class="form-check-label" for="remember-me">Remember me</label>
                </div>
                <button type="submit" class="btn btn-spring-green w-100">
                    <i class="bi bi-box-arrow-in-right me-1"></i> Sign In
                </button>
            </form>
        </div>
    </div>
</body>
</html>
