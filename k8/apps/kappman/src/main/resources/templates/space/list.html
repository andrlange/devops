<!DOCTYPE html>
<html lang="en" data-bs-theme="dark" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Spaces')}"></head>
<body>
<div class="app-container">
    <nav th:replace="~{fragments/layout :: sidebar}"></nav>
    <div class="main-wrapper">
        <header th:replace="~{fragments/layout :: topbar}"></header>
        <main class="main-content">

            <div th:if="${#lists.isEmpty(orgGroups)}" class="empty-state">
                <i class="bi bi-layers d-block"></i>
                <p>No spaces found</p>
            </div>

            <div th:each="orgGroup, orgStat : ${orgGroups}" class="mb-3">
                <!-- Org Header (collapsible) -->
                <div class="d-flex align-items-center p-2 rounded" style="cursor:pointer;background:rgba(232,167,53,0.08);"
                     data-bs-toggle="collapse" th:data-bs-target="'#spaces-org-' + ${orgStat.index}">
                    <i class="bi bi-chevron-down me-2" style="color:#e8a735;"></i>
                    <a th:href="@{/orgs/{guid}(guid=${orgGroup.orgGuid})}" class="text-decoration-none" onclick="event.stopPropagation();">
                        <i class="bi bi-building me-1" style="color:#e8a735;"></i>
                        <span style="color:#e8a735;font-weight:600;" th:text="${orgGroup.orgName}"></span>
                    </a>
                    <span class="badge bg-dark border ms-2" th:text="${#lists.size(orgGroup.spaces)} + ' spaces'"></span>
                    <span class="badge bg-dark border ms-1"><i class="bi bi-people me-1"></i><span th:text="${orgGroup.userCount}"></span></span>
                </div>

                <!-- Spaces Table (collapsible content) -->
                <div class="collapse show ms-3 mt-2" th:id="'spaces-org-' + ${orgStat.index}">
                    <div class="table-responsive">
                        <table class="table table-hover mb-0">
                            <thead>
                                <tr>
                                    <th>Name</th>
                                    <th>Users</th>
                                    <th>GUID</th>
                                    <th>K8s Namespace</th>
                                    <th>Created</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr th:each="entry : ${orgGroup.spaces}">
                                    <td>
                                        <a th:href="@{/orgs/{orgGuid}/spaces/{spaceGuid}(orgGuid=${entry.orgGuid}, spaceGuid=${entry.space.guid})}" class="text-decoration-none">
                                            <i class="bi bi-layers me-1" style="color:#4a9eff;"></i>
                                            <span style="color:#4a9eff;" th:text="${entry.space.name}"></span>
                                        </a>
                                    </td>
                                    <td>
                                        <span class="badge bg-dark border"><i class="bi bi-people me-1"></i><span th:text="${entry.userCount}"></span></span>
                                    </td>
                                    <td class="mono text-muted" th:text="${#strings.abbreviate(entry.space.guid, 20)}"></td>
                                    <td class="mono text-muted" th:text="'cf-space-' + ${#strings.abbreviate(entry.space.guid, 12)}"></td>
                                    <td class="text-muted" th:text="${entry.space.createdAt != null ? #strings.substring(entry.space.createdAt, 0, 10) : '-'}"></td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>

        </main>
    </div>
</div>
<div th:replace="~{fragments/layout :: scripts}"></div>
</body>
</html>
