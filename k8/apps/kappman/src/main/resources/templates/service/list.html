<!DOCTYPE html>
<html lang="en" data-bs-theme="dark" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Services')}"></head>
<body>
<div class="app-container">
    <nav th:replace="~{fragments/layout :: sidebar}"></nav>
    <div class="main-wrapper">
        <header th:replace="~{fragments/layout :: topbar}"></header>
        <main class="main-content">

            <div th:if="${success}" class="alert alert-success alert-dismissible fade show"><span th:text="${success}"></span><button type="button" class="btn-close" data-bs-dismiss="alert"></button></div>
            <div th:if="${error}" class="alert alert-danger alert-dismissible fade show"><span th:text="${error}"></span><button type="button" class="btn-close" data-bs-dismiss="alert"></button></div>

            <div th:if="${#lists.isEmpty(orgGroups)}" class="empty-state">
                <i class="bi bi-plug d-block"></i>
                <p>No service instances found</p>
            </div>

            <div th:each="orgGroup, orgStat : ${orgGroups}" class="mb-4">
                <!-- Org Header -->
                <div class="d-flex align-items-center p-2 rounded" style="cursor:pointer;background:rgba(232,167,53,0.08);"
                     data-bs-toggle="collapse" th:data-bs-target="'#svc-org-' + ${orgStat.index}">
                    <i class="bi bi-chevron-down me-2" style="color:#e8a735;"></i>
                    <a th:href="@{/orgs/{guid}(guid=${orgGroup.orgGuid})}" class="text-decoration-none" onclick="event.stopPropagation();">
                        <i class="bi bi-building me-1" style="color:#e8a735;"></i>
                        <span style="color:#e8a735;font-weight:600;" th:text="${orgGroup.orgName}"></span>
                    </a>
                    <span class="badge bg-dark border ms-2"><i class="bi bi-people me-1"></i><span th:text="${orgGroup.userCount}"></span></span>
                </div>

                <div class="collapse show ms-3 mt-2" th:id="'svc-org-' + ${orgStat.index}">
                    <div th:each="spaceGroup, spaceStat : ${orgGroup.spaceGroups}" class="mb-3">
                        <!-- Space Header -->
                        <div class="d-flex align-items-center p-2 rounded" style="cursor:pointer;background:rgba(74,158,255,0.06);"
                             data-bs-toggle="collapse" th:data-bs-target="'#svc-space-' + ${orgStat.index} + '-' + ${spaceStat.index}">
                            <i class="bi bi-chevron-down me-2" style="color:#4a9eff;"></i>
                            <i class="bi bi-layers me-1" style="color:#4a9eff;"></i>
                            <span style="color:#4a9eff;" th:text="${spaceGroup.spaceName}"></span>
                            <span class="badge bg-dark border ms-2" th:text="${#lists.size(spaceGroup.services)} + ' services'"></span>
                            <span class="badge bg-dark border ms-1"><i class="bi bi-people me-1"></i><span th:text="${spaceGroup.userCount}"></span></span>
                        </div>

                        <!-- Service Cards -->
                        <div class="collapse show ms-3 mt-2" th:id="'svc-space-' + ${orgStat.index} + '-' + ${spaceStat.index}">
                            <div th:each="entry : ${spaceGroup.services}" class="content-card mb-2">
                                <div class="d-flex justify-content-between align-items-start">
                                    <div>
                                        <span class="text-spring-green">
                                            <i class="bi bi-plug me-1"></i>
                                            <span th:text="${entry.service.name}"></span>
                                        </span>
                                        <span th:if="${entry.service.type == 'managed'}" class="badge bg-dark border small ms-2" title="Provisioned via Service Broker (OSBAPI)"><i class="bi bi-gear me-1"></i>Broker-Managed</span>
                                        <span th:if="${entry.service.type == 'user_provided'}" class="badge bg-dark border small ms-2" title="Manually configured credentials"><i class="bi bi-person me-1"></i>User-Provided</span>
                                        <span th:if="${entry.service.type != 'managed' and entry.service.type != 'user_provided'}" class="mono text-muted small ms-2" th:text="${entry.service.type}"></span>
                                    </div>
                                    <div class="d-flex align-items-center gap-2">
                                        <span class="badge" th:classappend="${entry.service.lastOperation?.state == 'succeeded' ? 'badge-started' : 'badge-staging'}"
                                              th:text="${entry.service.lastOperation?.state ?: '-'}"></span>
                                        <form th:action="@{/services/{guid}/delete(guid=${entry.service.guid})}" method="post" class="d-inline"
                                              onsubmit="return confirm('Delete this service instance?')">
                                            <button type="submit" class="btn btn-sm btn-outline-danger"><i class="bi bi-trash"></i></button>
                                        </form>
                                    </div>
                                </div>

                                <div class="d-flex gap-4 mt-2 small flex-wrap">
                                    <div>
                                        <span class="text-muted">Offering:</span>
                                        <span th:text="${entry.offeringName}"></span>
                                    </div>
                                    <div>
                                        <span class="text-muted">Plan:</span>
                                        <span class="badge bg-dark border"><i class="bi bi-tag me-1"></i><span th:text="${entry.planName}"></span></span>
                                    </div>
                                    <div>
                                        <span class="text-muted">Namespace:</span>
                                        <span class="mono text-muted" th:text="${entry.namespace}"></span>
                                    </div>
                                </div>

                                <!-- Bindings -->
                                <div class="mt-2" th:if="${entry.bindingCount > 0}">
                                    <div class="d-flex gap-2 flex-wrap">
                                        <span class="text-muted small">Bound to:</span>
                                        <span th:each="appName : ${entry.boundApps}" class="badge bg-dark border">
                                            <i class="bi bi-box me-1 text-spring-green"></i><span th:text="${appName}"></span>
                                        </span>
                                    </div>
                                </div>
                                <div class="mt-2" th:if="${entry.bindingCount == 0}">
                                    <span class="text-muted small"><i class="bi bi-link-45deg me-1"></i>No bindings</span>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

        </main>
    </div>
</div>
<div th:replace="~{fragments/layout :: scripts}"></div>
</body>
</html>
