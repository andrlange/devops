<!DOCTYPE html>
<html lang="en" data-bs-theme="dark" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head(${org?.name ?: 'Organization'})}"></head>
<body>
<div class="app-container">
    <nav th:replace="~{fragments/layout :: sidebar}"></nav>
    <div class="main-wrapper">
        <header th:replace="~{fragments/layout :: topbar}"></header>
        <main class="main-content">

            <nav aria-label="breadcrumb">
                <ol class="breadcrumb">
                    <li class="breadcrumb-item"><a th:href="@{/orgs}">Organizations</a></li>
                    <li class="breadcrumb-item active" th:text="${org?.name}"></li>
                </ol>
            </nav>

            <div class="content-card mb-3">
                <h6>Organization Details</h6>
                <div class="row">
                    <div class="col-md-6">
                        <div class="mb-2"><span class="text-muted">Name:</span> <span th:text="${org?.name}"></span></div>
                        <div class="mb-2"><span class="text-muted">GUID:</span> <span class="mono" th:text="${org?.guid}"></span></div>
                    </div>
                    <div class="col-md-6">
                        <div class="mb-2"><span class="text-muted">K8s Namespace:</span> <span class="mono" th:text="'cf-org-' + ${org?.guid}"></span></div>
                        <div class="mb-2"><span class="text-muted">Created:</span> <span th:text="${org?.createdAt}"></span></div>
                    </div>
                </div>
            </div>

            <div class="content-card">
                <div class="d-flex justify-content-between align-items-center mb-3">
                    <h6 class="mb-0">Spaces</h6>
                    <button th:if="${isAdmin}" class="btn btn-sm btn-outline-spring-green" data-bs-toggle="modal" data-bs-target="#createSpaceModal">
                        <i class="bi bi-plus-lg me-1"></i> Create Space
                    </button>
                </div>

                <div th:if="${#lists.isEmpty(spaces)}" class="text-muted small">No spaces in this organization</div>

                <div class="table-responsive" th:unless="${#lists.isEmpty(spaces)}">
                    <table class="table table-hover">
                        <thead>
                            <tr>
                                <th>Name</th>
                                <th>GUID</th>
                                <th>Created</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="space : ${spaces}">
                                <td>
                                    <a th:href="@{/orgs/{orgGuid}/spaces/{spaceGuid}(orgGuid=${org.guid}, spaceGuid=${space.guid})}" class="text-decoration-none text-spring-green">
                                        <i class="bi bi-layers me-1"></i>
                                        <span th:text="${space.name}"></span>
                                    </a>
                                </td>
                                <td class="mono text-muted" th:text="${#strings.abbreviate(space.guid, 20)}"></td>
                                <td class="text-muted" th:text="${space.createdAt != null ? #strings.substring(space.createdAt, 0, 10) : '-'}"></td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>

            <!-- Create Space Modal -->
            <div class="modal fade" id="createSpaceModal" tabindex="-1" th:if="${isAdmin}">
                <div class="modal-dialog">
                    <div class="modal-content" style="background: var(--spring-card); border-color: var(--spring-border);">
                        <form th:action="@{/orgs/{guid}/spaces(guid=${org.guid})}" method="post">
                            <div class="modal-header border-secondary">
                                <h5 class="modal-title">Create Space</h5>
                                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                            </div>
                            <div class="modal-body">
                                <div class="mb-3">
                                    <label for="spaceName" class="form-label">Space Name</label>
                                    <input type="text" class="form-control" id="spaceName" name="name" required autofocus>
                                </div>
                            </div>
                            <div class="modal-footer border-secondary">
                                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                                <button type="submit" class="btn btn-spring-green">Create</button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>

        </main>
    </div>
</div>
<div th:replace="~{fragments/layout :: scripts}"></div>
</body>
</html>
