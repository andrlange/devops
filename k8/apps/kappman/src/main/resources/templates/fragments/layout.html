<!DOCTYPE html>
<html lang="en" data-bs-theme="dark" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:fragment="head(title)">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="_csrf" th:content="${_csrf.token}">
    <meta name="_csrf_header" th:content="${_csrf.headerName}">
    <title th:text="'kappman — ' + ${title}">kappman</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link th:href="@{/css/kappman.css}" rel="stylesheet">
    <script src="https://unpkg.com/htmx.org@2.0.4"></script>
</head>
<body>
    <div class="app-container" th:fragment="app">
        <nav class="sidebar" id="sidebar" th:fragment="sidebar">
            <div class="sidebar-header">
                <span class="sidebar-logo">&#9752;</span>
                <span class="sidebar-brand">kappman</span>
            </div>
            <ul class="sidebar-nav">
                <li>
                    <a th:href="@{/}" th:classappend="${#strings.equals(activePage, 'dashboard')} ? 'active' : ''">
                        <i class="bi bi-grid"></i>
                        <span class="nav-label">Dashboard</span>
                    </a>
                </li>
                <li>
                    <a th:href="@{/orgs}" th:classappend="${#strings.equals(activePage, 'orgs')} ? 'active' : ''">
                        <i class="bi bi-building"></i>
                        <span class="nav-label">Organizations</span>
                    </a>
                </li>
                <li>
                    <a th:href="@{/spaces}" th:classappend="${#strings.equals(activePage, 'spaces')} ? 'active' : ''">
                        <i class="bi bi-layers"></i>
                        <span class="nav-label">Spaces</span>
                    </a>
                </li>
                <li>
                    <a th:href="@{/apps}" th:classappend="${#strings.equals(activePage, 'apps')} ? 'active' : ''">
                        <i class="bi bi-box"></i>
                        <span class="nav-label">Applications</span>
                    </a>
                </li>
                <li>
                    <a th:href="@{/services}" th:classappend="${#strings.equals(activePage, 'services')} ? 'active' : ''">
                        <i class="bi bi-plug"></i>
                        <span class="nav-label">Services</span>
                    </a>
                </li>
                <li>
                    <a th:href="@{/marketplace}" th:classappend="${#strings.equals(activePage, 'marketplace')} ? 'active' : ''">
                        <i class="bi bi-shop"></i>
                        <span class="nav-label">Marketplace</span>
                    </a>
                </li>
                <li>
                    <a th:href="@{/buildpacks}" th:classappend="${#strings.equals(activePage, 'buildpacks')} ? 'active' : ''">
                        <i class="bi bi-bricks"></i>
                        <span class="nav-label">Buildpacks</span>
                    </a>
                </li>
                <li>
                    <a th:href="@{/status}" th:classappend="${#strings.equals(activePage, 'status')} ? 'active' : ''">
                        <i class="bi bi-heart-pulse"></i>
                        <span class="nav-label">Status</span>
                    </a>
                </li>
                <li sec:authorize="hasRole('ADMIN')">
                    <a th:href="@{/admin/users}" th:classappend="${#strings.equals(activePage, 'admin')} ? 'active' : ''">
                        <i class="bi bi-gear"></i>
                        <span class="nav-label">Settings</span>
                    </a>
                </li>
            </ul>
            <div class="sidebar-footer">
                <div class="text-center mb-1">
                    <span class="nav-label text-muted" style="font-size:10px;" th:text="${appVersion}"></span>
                </div>
                <button class="sidebar-toggle" id="sidebarToggle" title="Toggle sidebar">
                    <i class="bi bi-list"></i>
                </button>
            </div>
        </nav>

        <div class="main-wrapper">
            <header class="topbar" th:fragment="topbar">
                <div class="topbar-left">
                    <h5 class="mb-0" th:text="${pageTitle ?: 'Dashboard'}">Dashboard</h5>
                </div>
                <div class="topbar-right">
                    <span class="badge bg-dark border me-2" th:text="${runtimeEnv}">Local</span>
                    <span class="text-muted me-3" sec:authentication="name">user</span>
                    <form th:action="@{/logout}" method="post" class="d-inline">
                        <button type="submit" class="btn btn-sm btn-outline-secondary">
                            <i class="bi bi-box-arrow-right"></i>
                        </button>
                    </form>
                </div>
            </header>

            <main class="main-content" th:fragment="content">
                <!-- Page content goes here -->
            </main>
        </div>
    </div>

    <div th:fragment="scripts">
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
        <script th:src="@{/js/sidebar.js}"></script>
        <script>
            document.addEventListener('htmx:configRequest', function(evt) {
                var csrf = document.querySelector('meta[name="_csrf"]');
                var csrfHeader = document.querySelector('meta[name="_csrf_header"]');
                if (csrf && csrfHeader) {
                    evt.detail.headers[csrfHeader.content] = csrf.content;
                }
            });
        </script>
    </div>
</body>
</html>
