traefik:
  image:
    registry: artifactory.cfapps.cool
    repository: docker-local/traefik
    tag: "v3.7.1-arm64"

  deployment:
    imagePullSecrets:
      - name: artifact-keeper-pull

  service:
    type: LoadBalancer

  ingressRoute:
    dashboard:
      enabled: true
      matchRule: Host(`traefik.development.cfapps.cool`)
      entryPoints:
        - websecure

  providers:
    kubernetesCRD:
      enabled: true
      allowCrossNamespace: true
    kubernetesIngress:
      enabled: true

  resources:
    requests:
      memory: 256Mi
      cpu: 250m
    limits:
      memory: 512Mi
      cpu: 500m

  additionalArguments:
    - "--api.dashboard=true"
    - "--entrypoints.web.http.redirections.entryPoint.to=websecure"
    - "--entrypoints.web.http.redirections.entryPoint.scheme=https"
    - "--entrypoints.websecure.http.tls"
    # Large OCI blob uploads (e.g. kpack pushing the Korifi builder to
    # artifact-keeper) stream for minutes. Traefik v3 defaults
    # respondingTimeouts.readTimeout to 60s, which cuts the streamed
    # PATCH mid-upload — the backend then 400s and Traefik returns 502,
    # so the kpack ClusterBuilder never gets a latestImage. Raise the
    # request read/write/idle timeouts so big pushes complete.
    - "--entrypoints.websecure.transport.respondingTimeouts.readTimeout=900s"
    - "--entrypoints.websecure.transport.respondingTimeouts.writeTimeout=900s"
    - "--entrypoints.websecure.transport.respondingTimeouts.idleTimeout=900s"
