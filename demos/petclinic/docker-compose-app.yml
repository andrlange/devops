services:
  postgres:
    image: postgres:18
    container_name: petclinic-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-petclinic}
      POSTGRES_USER: ${POSTGRES_USER:-petclinic}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-petclinic}
    volumes:
      - pg-data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-petclinic}"]
      interval: 5s
      timeout: 3s
      retries: 5

  petclinic:
    build: .
    container_name: petclinic-app
    restart: unless-stopped
    ports:
      - "${APP_PORT:-8080}:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-petclinic}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-petclinic}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-petclinic}
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pg-data:
    name: petclinic-app-pg-data
