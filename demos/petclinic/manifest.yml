applications:
- name: petclinic
  memory: 2G
  instances: 1
  path: build/libs/petclinic-0.0.1-SNAPSHOT.jar
  routes:
  - route: petclinic.app.cfapps.cool
  buildpacks:
  - paketo-buildpacks/java
  env:
    BP_JVM_VERSION: "25"
    BPL_SPRING_CLOUD_BINDINGS_DISABLED: "true"
  services:
  - petclinic-db
