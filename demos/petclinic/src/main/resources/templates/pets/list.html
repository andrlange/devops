<!DOCTYPE html>
<html lang="en" data-bs-theme="dark" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pets | Petclinic</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link th:href="@{/css/petclinic.css}" rel="stylesheet">
</head>
<body>
    <div th:replace="~{fragments/navbar :: navbar('pets')}"></div>

    <div class="container py-4">

        <!-- Page Header -->
        <div class="d-flex justify-content-between align-items-center mb-4">
            <div class="hero">
                <h1><i class="bi bi-heart me-2"></i>Pets</h1>
                <p class="mb-0">Browse and manage all registered pets</p>
            </div>
            <a th:href="@{/pets/new}" class="btn btn-primary">
                <i class="bi bi-plus-lg me-1"></i>Add Pet
            </a>
        </div>

        <!-- Type Filter Tabs -->
        <ul class="nav nav-pills mb-3">
            <li class="nav-item">
                <a class="nav-link active" href="#" data-type-filter="all">All</a>
            </li>
            <li class="nav-item">
                <a class="nav-link" href="#" data-type-filter="dog">Dogs</a>
            </li>
            <li class="nav-item">
                <a class="nav-link" href="#" data-type-filter="cat">Cats</a>
            </li>
            <li class="nav-item">
                <a class="nav-link" href="#" data-type-filter="rodents">Rodents</a>
            </li>
            <li class="nav-item">
                <a class="nav-link" href="#" data-type-filter="bird">Birds</a>
            </li>
            <li class="nav-item">
                <a class="nav-link" href="#" data-type-filter="other">Other</a>
            </li>
        </ul>

        <!-- Search Bar -->
        <div class="search-bar mb-4">
            <div class="input-group">
                <span class="input-group-text" style="background-color: var(--spring-card); border-color: var(--spring-border); color: var(--spring-muted);">
                    <i class="bi bi-search"></i>
                </span>
                <input type="text" class="form-control" id="pet-search"
                       data-live-filter="filterable-list"
                       placeholder="Filter pets by name, type, owner...">
            </div>
        </div>

        <!-- Pet Cards Grid -->
        <div class="row g-3" id="filterable-list" th:if="${!pets.isEmpty()}">
            <div class="col-md-4 col-lg-3" th:each="pet : ${pets}"
                 th:attr="data-filter-text=${pet.name + ' ' + pet.type.name + ' ' + pet.owner.firstName + ' ' + pet.owner.lastName},data-pet-type=${pet.type.name}">
                <a th:href="@{/pets/{id}(id=${pet.id})}" class="text-decoration-none">
                    <div class="card h-100">
                        <div class="card-body d-flex align-items-start gap-3">
                            <!-- Type image -->
                            <img th:src="@{'/images/types/' + ${pet.type.name.toLowerCase().replace(' ', '-')} + '.svg'}"
                                 th:alt="${pet.type.name}" class="pet-thumbnail">
                            <!-- Details -->
                            <div>
                                <h6 class="mb-1 text-white" th:text="${pet.name}">Buddy</h6>
                                <span class="badge bg-spring mb-1" th:text="${pet.type.name}">Dog</span>
                                <div class="small text-muted" th:text="${pet.owner.firstName + ' ' + pet.owner.lastName}">
                                    John Doe
                                </div>
                                <div class="small text-muted" th:text="${pet.birthDate}">2020-01-15</div>
                            </div>
                        </div>
                    </div>
                </a>
            </div>
        </div>

        <!-- Empty State -->
        <div th:if="${pets.isEmpty()}" class="text-center py-5">
            <i class="bi bi-inbox display-1 text-muted"></i>
            <h4 class="mt-3 text-muted">No pets found</h4>
            <a th:href="@{/pets/new}" class="btn btn-primary mt-2">
                <i class="bi bi-plus-lg me-1"></i>Add a Pet
            </a>
        </div>

    </div>

    <div th:replace="~{fragments/layout :: footer}"></div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script th:src="@{/js/live-filter.js}"></script>
</body>
</html>
