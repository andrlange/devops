<!DOCTYPE html>
<html lang="en" data-bs-theme="dark" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${pet.name + ' | Petclinic'}">Pet Detail | Petclinic</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link th:href="@{/css/petclinic.css}" rel="stylesheet">
</head>
<body>
    <div th:replace="~{fragments/navbar :: navbar('pets')}"></div>

    <div class="container py-4">

        <!-- Breadcrumb -->
        <nav aria-label="breadcrumb" class="mb-4">
            <ol class="breadcrumb">
                <li class="breadcrumb-item"><a th:href="@{/pets}">Pets</a></li>
                <li class="breadcrumb-item active" th:text="${pet.name}">Buddy</li>
            </ol>
        </nav>

        <!-- Pet Details -->
        <div class="row g-4 mb-5">
            <!-- Image -->
            <div class="col-md-4 col-lg-3">
                <img th:src="@{'/images/types/' + ${pet.type.name.toLowerCase().replace(' ', '-')} + '.svg'}"
                     th:alt="${pet.type.name}"
                     class="img-fluid rounded" style="max-height: 200px; width: 100%; object-fit: contain; border: 2px solid var(--spring-border); background-color: var(--spring-card);">
            </div>

            <!-- Details -->
            <div class="col-md-8 col-lg-9">
                <h2 class="mb-3 text-white" th:text="${pet.name}">Buddy</h2>
                <table class="table table-borderless" style="max-width: 400px;">
                    <tr>
                        <td class="label">Type</td>
                        <td><span class="badge bg-spring" th:text="${pet.type.name}">Dog</span></td>
                    </tr>
                    <tr>
                        <td class="label">Birth Date</td>
                        <td class="value" th:text="${pet.birthDate}">2020-01-15</td>
                    </tr>
                    <tr>
                        <td class="label">Owner</td>
                        <td>
                            <a th:href="@{/owners/{id}(id=${pet.owner.id})}"
                               th:text="${pet.owner.firstName + ' ' + pet.owner.lastName}">John Doe</a>
                        </td>
                    </tr>
                </table>

                <!-- Action Buttons -->
                <div class="d-flex gap-2 mt-3">
                    <a th:href="@{/pets/{id}/edit(id=${pet.id})}" class="btn btn-outline-primary">
                        <i class="bi bi-pencil me-1"></i>Edit
                    </a>
                    <form th:action="@{/pets/{id}/delete(id=${pet.id})}" method="post"
                          onsubmit="return confirm('Are you sure you want to delete this pet? This action cannot be undone.');">
                        <button type="submit" class="btn btn-outline-danger">
                            <i class="bi bi-trash me-1"></i>Delete
                        </button>
                    </form>
                </div>
            </div>
        </div>

        <!-- Visit History -->
        <div class="card">
            <div class="card-header">
                <i class="bi bi-calendar-check me-2"></i>Visit History
            </div>
            <div class="card-body p-0">
                <div class="table-responsive" th:if="${!visits.isEmpty()}">
                    <table class="table table-hover mb-0">
                        <thead>
                            <tr>
                                <th>Date</th>
                                <th>Time</th>
                                <th>Vet</th>
                                <th>Description</th>
                                <th>Status</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="visit : ${visits}">
                                <td th:text="${visit.date}">2024-01-15</td>
                                <td th:text="${visit.time}">10:00</td>
                                <td th:text="${'Dr. ' + visit.vet.firstName + ' ' + visit.vet.lastName}">Dr. Jane Smith</td>
                                <td th:text="${visit.description}">Annual checkup</td>
                                <td>
                                    <span class="badge"
                                          th:classappend="${visit.status.name() == 'SCHEDULED'} ? 'badge-status-scheduled' : (${visit.status.name() == 'COMPLETED'} ? 'badge-status-completed' : 'badge-status-cancelled')"
                                          th:text="${visit.status}">SCHEDULED</span>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
                <div th:if="${visits.isEmpty()}" class="text-center py-4 text-muted">
                    <i class="bi bi-calendar-x display-6"></i>
                    <p class="mt-2 mb-0">No visits recorded yet.</p>
                </div>
            </div>
        </div>

        <!-- AI Chat Widget (when AI enabled) -->
        <div th:if="${aiEnabled}" class="mt-4">
            <div th:replace="~{fragments/ai-chat-widget :: chatWidget(${pet}, ${visits})}"></div>
        </div>

    </div>

    <div th:replace="~{fragments/layout :: footer}"></div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <th:block th:if="${aiEnabled}">
        <script src="https://cdn.jsdelivr.net/npm/sockjs-client@1/dist/sockjs.min.js"></script>
        <script src="https://cdn.jsdelivr.net/npm/@stomp/stompjs@7/bundles/stomp.umd.min.js"></script>
        <script th:src="@{/js/ai-chat.js}"></script>
    </th:block>
</body>
</html>
