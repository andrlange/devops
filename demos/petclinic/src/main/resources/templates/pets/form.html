<!DOCTYPE html>
<html lang="en" data-bs-theme="dark" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${pet.id == 0 ? 'New Pet' : 'Edit Pet'} + ' | Petclinic'">Pet Form | Petclinic</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link th:href="@{/css/petclinic.css}" rel="stylesheet">
</head>
<body>
    <div th:replace="~{fragments/navbar :: navbar('pets')}"></div>

    <div class="container py-4">

        <!-- Breadcrumb -->
        <nav aria-label="breadcrumb" class="mb-4">
            <ol class="breadcrumb">
                <li class="breadcrumb-item"><a th:href="@{/pets}">Pets</a></li>
                <li class="breadcrumb-item active"
                    th:text="${pet.id == 0 ? 'New Pet' : 'Edit ' + pet.name}">New Pet</li>
            </ol>
        </nav>

        <!-- Form Card -->
        <div class="row justify-content-center">
            <div class="col-lg-8 col-xl-6">
                <div class="card">
                    <div class="card-header">
                        <i class="bi bi-github me-2"></i>
                        <span th:text="${pet.id == 0 ? 'New Pet' : 'Edit Pet'}">New Pet</span>
                    </div>
                    <div class="card-body p-4">
                        <form th:action="${pet.id == 0 ? '/pets/new' : '/pets/' + pet.id + '/edit'}"
                              method="post" th:object="${pet}">

                            <!-- Name -->
                            <div class="mb-3">
                                <label for="name" class="form-label">Name</label>
                                <input type="text" class="form-control" id="name" th:field="*{name}"
                                       placeholder="Enter pet name" required>
                                <div class="invalid-feedback">Please enter a pet name.</div>
                            </div>

                            <!-- Birth Date -->
                            <div class="mb-3">
                                <label for="birthDate" class="form-label">Birth Date</label>
                                <input type="date" class="form-control" id="birthDate" name="birthDate"
                                       th:value="${pet.birthDate != null ? pet.birthDate.toString() : ''}">
                            </div>

                            <!-- Pet Type -->
                            <div class="mb-3">
                                <label for="typeId" class="form-label">Type</label>
                                <select class="form-select" id="typeId" name="typeId" required>
                                    <option value="">Select a type...</option>
                                    <option th:each="petType : ${petTypes}"
                                            th:value="${petType.id}"
                                            th:text="${petType.name}"
                                            th:selected="${pet.type != null and pet.type.id == petType.id}">
                                        Dog
                                    </option>
                                </select>
                            </div>

                            <!-- Owner -->
                            <div class="mb-3">
                                <label for="ownerId" class="form-label">Owner</label>
                                <select class="form-select" id="ownerId" name="ownerId" required>
                                    <option value="">Select an owner...</option>
                                    <option th:each="owner : ${owners}"
                                            th:value="${owner.id}"
                                            th:text="${owner.firstName + ' ' + owner.lastName}"
                                            th:selected="${pet.owner != null and pet.owner.id == owner.id}">
                                        John Doe
                                    </option>
                                </select>
                            </div>

                            <!-- Buttons -->
                            <div class="d-flex gap-2 mt-4">
                                <button type="submit" class="btn btn-primary">
                                    <i class="bi bi-check-lg me-1"></i>
                                    <span th:text="${pet.id == 0 ? 'Create Pet' : 'Save Changes'}">Create Pet</span>
                                </button>
                                <a th:href="${pet.id == 0 ? '/pets' : '/pets/' + pet.id}"
                                   class="btn btn-outline-secondary">Cancel</a>
                            </div>

                        </form>
                    </div>
                </div>
            </div>
        </div>

    </div>

    <div th:replace="~{fragments/layout :: footer}"></div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
