<!DOCTYPE html>
<html lang="en" data-bs-theme="dark" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Error | Petclinic</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link th:href="@{/css/petclinic.css}" rel="stylesheet">
</head>
<body>
    <div th:replace="~{fragments/navbar :: navbar('')}"></div>

    <div class="container py-5">
        <div class="text-center">
            <i class="bi bi-exclamation-triangle" style="font-size: 4rem; color: #e6a23c;"></i>
            <h1 class="mt-3">
                <span th:text="${status}" th:if="${status != null}">500</span>
                <span th:if="${status == null}">Error</span>
            </h1>
            <p class="text-muted mt-2" th:if="${error != null}" th:text="${error}">Something went wrong</p>
            <p class="text-muted mt-2" th:if="${message != null and !message.isEmpty()}" th:text="${message}"></p>
            <a th:href="@{/}" class="btn btn-primary mt-4">
                <i class="bi bi-house-door me-1"></i>Back to Home
            </a>
        </div>
    </div>

    <div th:replace="~{fragments/layout :: footer}"></div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
