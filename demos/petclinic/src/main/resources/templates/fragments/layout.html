<!DOCTYPE html>
<html lang="en" data-bs-theme="dark" xmlns:th="http://www.thymeleaf.org">
<head th:fragment="head(pageTitle)">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${pageTitle != null ? pageTitle + ' | Petclinic' : 'Petclinic'}">Petclinic</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link th:href="@{/css/petclinic.css}" rel="stylesheet">
</head>
<body>

    <!--/* ============================================================
         Fragment: footer
         Usage: <div th:replace="~{fragments/layout :: footer}"></div>
         ============================================================ */-->
    <footer th:fragment="footer" class="text-center py-4 mt-5">
        <div class="container">
            <p class="mb-1">
                <i class="bi bi-heart-pulse-fill me-1" style="color: var(--spring-green);"></i>
                <strong>Spring Petclinic</strong> &mdash; built with
                <a href="https://spring.io/projects/spring-boot" target="_blank">Spring Boot</a>,
                <a href="https://www.thymeleaf.org/" target="_blank">Thymeleaf</a> &amp;
                <a href="https://getbootstrap.com/" target="_blank">Bootstrap</a>
            </p>
        </div>
    </footer>

    <!--/* ============================================================
         Fragment: scripts
         Usage: <div th:replace="~{fragments/layout :: scripts}"></div>
         ============================================================ */-->
    <th:block th:fragment="scripts">
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    </th:block>

</body>
</html>
