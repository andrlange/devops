<!DOCTYPE html>
<html lang="en" data-bs-theme="dark" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Veterinarians | Petclinic</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link th:href="@{/css/petclinic.css}" rel="stylesheet">
</head>
<body>
    <div th:replace="~{fragments/navbar :: navbar('vets')}"></div>

    <div class="container py-4">

        <!-- Page Header -->
        <div class="hero mb-4">
            <h1><i class="bi bi-clipboard2-pulse me-2"></i>Veterinarians</h1>
            <p class="mb-0">Our team of qualified veterinary professionals</p>
        </div>

        <!-- Vet Cards Grid -->
        <div class="row g-3" th:if="${!vets.isEmpty()}">
            <div class="col-md-4 col-lg-3" th:each="vet : ${vets}">
                <div class="card h-100">
                    <div class="card-body text-center">
                        <i class="bi bi-person-badge display-4 mb-3" style="color: var(--spring-green);"></i>
                        <h5 class="text-white mb-2"
                            th:text="${'Dr. ' + vet.firstName + ' ' + vet.lastName}">Dr. Jane Smith</h5>
                        <div class="d-flex flex-wrap gap-1 justify-content-center" th:if="${!vet.specialties.isEmpty()}">
                            <span class="badge-specialty" th:each="specialty : ${vet.specialties}"
                                  th:text="${specialty.name}">Surgery</span>
                        </div>
                        <div th:if="${vet.specialties.isEmpty()}" class="text-muted small">
                            General Practice
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Empty State -->
        <div th:if="${vets.isEmpty()}" class="text-center py-5">
            <i class="bi bi-inbox display-1 text-muted"></i>
            <h4 class="mt-3 text-muted">No veterinarians found</h4>
        </div>

    </div>

    <div th:replace="~{fragments/layout :: footer}"></div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
