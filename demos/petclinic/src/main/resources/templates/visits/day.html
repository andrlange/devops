<!DOCTYPE html>
<html lang="en" data-bs-theme="dark" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${formattedDate + ' | Petclinic'}">Day View | Petclinic</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link th:href="@{/css/petclinic.css}" rel="stylesheet">
</head>
<body>
    <div th:replace="~{fragments/navbar :: navbar('appointments')}"></div>

    <div class="container py-4">

        <!-- Page header -->
        <div class="hero mb-4">
            <div class="d-flex align-items-center gap-3 mb-2">
                <a th:href="@{/appointments(year=${date.year}, month=${date.monthValue})}"
                   class="btn btn-outline-secondary btn-sm">
                    <i class="bi bi-arrow-left me-1"></i>Back to Calendar
                </a>
            </div>
            <h1><i class="bi bi-calendar-day me-2"></i><span th:text="${formattedDate}">Friday, March 21, 2026</span></h1>
        </div>

        <!-- Appointments table -->
        <div class="card" th:if="${!visits.isEmpty()}">
            <div class="card-header">
                <i class="bi bi-clock me-1"></i>Appointments
                <span class="badge bg-spring ms-2" th:text="${visits.size()}">0</span>
            </div>
            <div class="card-body p-0">
                <div class="table-responsive">
                    <table class="table table-hover mb-0">
                        <thead>
                            <tr>
                                <th>Time</th>
                                <th>Pet</th>
                                <th>Owner</th>
                                <th>Vet</th>
                                <th>Description</th>
                                <th>Status</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="visit : ${visits}">
                                <td>
                                    <strong th:text="${#temporals.format(visit.time, 'HH:mm')}">09:00</strong>
                                </td>
                                <td>
                                    <a th:href="@{/pets/{id}(id=${visit.pet.id})}" th:text="${visit.pet.name}">Buddy</a>
                                </td>
                                <td th:text="${visit.pet.owner.firstName + ' ' + visit.pet.owner.lastName}">John Doe</td>
                                <td th:text="'Dr. ' + ${visit.vet.firstName} + ' ' + ${visit.vet.lastName}">Dr. Jane Smith</td>
                                <td>
                                    <span th:if="${visit.description != null and !visit.description.isEmpty()}"
                                          th:text="${visit.description}">Checkup</span>
                                    <span th:if="${visit.description == null or visit.description.isEmpty()}"
                                          class="text-muted">--</span>
                                </td>
                                <td>
                                    <span class="badge"
                                          th:classappend="${visit.status.name() == 'SCHEDULED'} ? 'badge-status-scheduled' : (${visit.status.name() == 'COMPLETED'} ? 'badge-status-completed' : 'badge-status-cancelled')"
                                          th:text="${visit.status.name()}">SCHEDULED</span>
                                </td>
                                <td>
                                    <div class="d-flex gap-1 flex-wrap">
                                        <a th:href="@{/appointments/{id}/edit(id=${visit.id})}"
                                           class="btn btn-sm btn-outline-secondary" title="Edit">
                                            <i class="bi bi-pencil"></i>
                                        </a>
                                        <!-- Quick status buttons for SCHEDULED visits -->
                                        <form th:if="${visit.status.name() == 'SCHEDULED'}"
                                              th:action="@{/appointments/{id}/status(id=${visit.id})}"
                                              method="post" class="d-inline">
                                            <input type="hidden" name="status" value="COMPLETED">
                                            <button type="submit" class="btn btn-sm btn-outline-primary" title="Mark Complete">
                                                <i class="bi bi-check-lg"></i>
                                            </button>
                                        </form>
                                        <form th:if="${visit.status.name() == 'SCHEDULED'}"
                                              th:action="@{/appointments/{id}/status(id=${visit.id})}"
                                              method="post" class="d-inline">
                                            <input type="hidden" name="status" value="CANCELLED">
                                            <button type="submit" class="btn btn-sm btn-outline-danger" title="Cancel">
                                                <i class="bi bi-x-lg"></i>
                                            </button>
                                        </form>
                                    </div>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>

        <!-- No appointments message -->
        <div th:if="${visits.isEmpty()}" class="card">
            <div class="card-body text-center py-5">
                <i class="bi bi-calendar-x" style="font-size: 3rem; color: var(--spring-muted);"></i>
                <p class="mt-3 mb-0 text-muted">No appointments scheduled for this day.</p>
            </div>
        </div>

        <!-- AI Tips panel (when AI enabled and at least one visit exists) -->
        <div th:if="${aiEnabled and !visits.isEmpty()}" class="card mt-3">
            <div class="card-header" style="background: rgba(187, 134, 252, 0.1);">
                <i class="bi bi-stars me-2" style="color: #bb86fc;"></i>AI Tips
            </div>
            <div class="card-body">
                <p class="text-muted small mb-3">Select an appointment to get AI advice:</p>
                <div th:each="visit, iterStat : ${visits}" class="mb-2">
                    <button class="btn btn-sm btn-outline-secondary"
                            th:id="'aiTipsBtn-' + ${visit.id}"
                            th:attr="onclick='loadDayAiTips(' + ${visit.id} + ')'"
                            th:text="'Visit at ' + ${#temporals.format(visit.time, 'HH:mm')} + ' — ' + ${visit.pet.name}">
                        Get tips
                    </button>
                    <div th:id="'aiTipsResult-' + ${visit.id}" class="mt-2 ms-2" style="display:none;"></div>
                </div>
            </div>
        </div>

        <!-- Actions -->
        <div class="mt-4">
            <a th:href="@{/appointments/new(date=${date})}" class="btn btn-primary">
                <i class="bi bi-plus-circle me-1"></i>New Appointment
            </a>
        </div>

    </div>

    <div th:replace="~{fragments/layout :: footer}"></div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <!-- AI Tips JS (when AI enabled and visits exist) -->
    <th:block th:if="${aiEnabled and !visits.isEmpty()}">
        <script src="https://cdn.jsdelivr.net/npm/sockjs-client@1/dist/sockjs.min.js"></script>
        <script src="https://cdn.jsdelivr.net/npm/@stomp/stompjs@7/bundles/stomp.umd.min.js"></script>
        <script th:src="@{/js/ai-chat.js}"></script>
        <script th:inline="javascript">
        /*<![CDATA[*/
        var dayVisits = /*[[${visits.![{id: id, description: description, petName: pet.name, petType: (pet.type != null ? pet.type.name : '')}]}]]*/ [];
        /*]]>*/

        var dayTipsConnected = false;
        var dayTipsQueue     = null;

        function loadDayAiTips(visitId) {
            var btn       = document.getElementById('aiTipsBtn-' + visitId);
            var resultDiv = document.getElementById('aiTipsResult-' + visitId);
            var visitInfo = dayVisits.find(function(v) { return v.id === visitId; });
            if (!visitInfo || !resultDiv) return;

            if (btn) btn.style.display = 'none';
            resultDiv.style.display = '';
            resultDiv.innerHTML = '<span class="ai-tips-loading"><i class="bi bi-stars me-1"></i>Getting AI advice…</span>';

            var question = 'I have a vet appointment for ' + visitInfo.petName
                + (visitInfo.petType ? ' (' + visitInfo.petType + ')' : '')
                + (visitInfo.description ? ' with the following notes: ' + visitInfo.description : '')
                + '. What tips or things should I watch out for during this visit?';

            function sendDayTip() {
                var sessionId    = AiChat.generateSessionId();
                AiChat.sessionId = sessionId;

                resultDiv.innerHTML = '';
                var responseText = '';
                var responseDiv  = document.createElement('div');
                responseDiv.className = 'ai-tips-content';
                resultDiv.appendChild(responseDiv);

                var origToken    = AiChat.renderToken.bind(AiChat);
                var origComplete = AiChat.renderComplete.bind(AiChat);
                var origError    = AiChat.renderError.bind(AiChat);

                AiChat.renderToken = function(token) {
                    responseText += token;
                    responseDiv.innerHTML = AiChat._markdownToHtml(responseText);
                };
                AiChat.renderComplete = function() {
                    if (!responseText) responseDiv.textContent = '(No response)';
                    else responseDiv.innerHTML = AiChat._markdownToHtml(responseText);
                    AiChat.renderToken    = origToken;
                    AiChat.renderComplete = origComplete;
                    AiChat.renderError    = origError;
                };
                AiChat.renderError = function(msg) {
                    responseDiv.innerHTML = '<span class="text-danger"><i class="bi bi-exclamation-triangle-fill me-1"></i>' + AiChat._escapeHtml(msg) + '</span>';
                    AiChat.renderToken    = origToken;
                    AiChat.renderComplete = origComplete;
                    AiChat.renderError    = origError;
                };

                AiChat.stompClient.publish({
                    destination: '/app/chat.send',
                    body: JSON.stringify({ content: question, sessionId: sessionId, petId: null })
                });
            }

            if (dayTipsConnected) {
                sendDayTip();
            } else {
                AiChat.connect(null,
                    function() { dayTipsConnected = true; sendDayTip(); },
                    function(err) {
                        resultDiv.innerHTML = '<span class="text-danger">Could not connect to AI: ' + err + '</span>';
                    }
                );
            }
        }
        </script>
    </th:block>
</body>
</html>
