<!DOCTYPE html>
<html lang="en" data-bs-theme="dark" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${visit.id != 0 ? 'Edit Appointment' : 'New Appointment'} + ' | Petclinic'">Appointment | Petclinic</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link th:href="@{/css/petclinic.css}" rel="stylesheet">
</head>
<body>
    <div th:replace="~{fragments/navbar :: navbar('appointments')}"></div>

    <div class="container py-4">

        <!-- Page header -->
        <div class="hero mb-4">
            <h1>
                <i class="bi bi-calendar-plus me-2" th:if="${visit.id == 0}"></i>
                <i class="bi bi-pencil-square me-2" th:if="${visit.id != 0}"></i>
                <span th:text="${visit.id != 0 ? 'Edit Appointment' : 'New Appointment'}">New Appointment</span>
            </h1>
        </div>

        <div class="card">
            <div class="card-body">
                <form th:action="${visit.id != 0 ? '/appointments/' + visit.id + '/edit' : '/appointments/new'}"
                      method="post">

                    <!-- Pet -->
                    <div class="mb-3">
                        <label for="petId" class="form-label">Pet</label>
                        <select id="petId" name="petId" class="form-select" required>
                            <option value="">-- Select a pet --</option>
                            <option th:each="pet : ${pets}"
                                    th:value="${pet.id}"
                                    th:text="${pet.name + ' (Owner: ' + pet.owner.firstName + ' ' + pet.owner.lastName + ')'}"
                                    th:selected="${(selectedPetId != null and pet.id == selectedPetId) or (visit.id != 0 and pet.id == visit.pet.id)}">
                                Buddy (Owner: John Doe)
                            </option>
                        </select>
                    </div>

                    <!-- Vet -->
                    <div class="mb-3">
                        <label for="vetId" class="form-label">Vet</label>
                        <select id="vetId" name="vetId" class="form-select" required>
                            <option value="">-- Select a vet --</option>
                            <option th:each="vet : ${vets}"
                                    th:value="${vet.id}"
                                    th:text="'Dr. ' + ${vet.firstName} + ' ' + ${vet.lastName}"
                                    th:selected="${visit.id != 0 and vet.id == visit.vet.id}">
                                Dr. Jane Smith
                            </option>
                        </select>
                    </div>

                    <!-- Date -->
                    <div class="mb-3">
                        <label for="date" class="form-label">Date</label>
                        <input type="date" id="date" name="date" class="form-control" required
                               th:value="${visit.date}">
                    </div>

                    <!-- Time -->
                    <div class="mb-3">
                        <label for="time" class="form-label">Time</label>
                        <input type="time" id="time" name="time" class="form-control" required
                               th:value="${#temporals.format(visit.time, 'HH:mm')}">
                    </div>

                    <!-- Description -->
                    <div class="mb-3">
                        <label for="description" class="form-label">Description</label>
                        <textarea id="description" name="description" class="form-control" rows="3"
                                  th:text="${visit.description}"></textarea>
                    </div>

                    <!-- Status -->
                    <div class="mb-4">
                        <label for="status" class="form-label">Status</label>
                        <select id="status" name="status" class="form-select">
                            <option value="SCHEDULED"
                                    th:selected="${visit.status.name() == 'SCHEDULED'}">SCHEDULED</option>
                            <option value="COMPLETED"
                                    th:selected="${visit.status.name() == 'COMPLETED'}">COMPLETED</option>
                            <option value="CANCELLED"
                                    th:selected="${visit.status.name() == 'CANCELLED'}">CANCELLED</option>
                        </select>
                    </div>

                    <!-- Buttons -->
                    <div class="d-flex gap-2">
                        <button type="submit" class="btn btn-primary">
                            <i class="bi bi-check-lg me-1"></i>
                            <span th:text="${visit.id != 0 ? 'Update' : 'Create'}">Create</span>
                        </button>
                        <a th:href="@{/appointments}" class="btn btn-outline-secondary">
                            <i class="bi bi-x-lg me-1"></i>Cancel
                        </a>
                    </div>

                </form>
            </div>
        </div>

        <!-- AI Tips (when AI enabled and editing an existing visit) -->
        <div th:if="${aiEnabled and visit.id != 0}" class="card mt-3">
            <div class="card-header" style="background: rgba(187, 134, 252, 0.1);">
                <i class="bi bi-stars me-2" style="color: #bb86fc;"></i>AI Tips
            </div>
            <div class="card-body" id="aiTipsContent">
                <button class="btn btn-sm btn-outline-secondary" onclick="loadAiTips()" id="aiTipsBtn">
                    <i class="bi bi-lightbulb me-1"></i>Get AI advice for this visit
                </button>
                <div id="aiTipsResult" class="mt-2" style="display:none;"></div>
            </div>
        </div>

    </div>

    <div th:replace="~{fragments/layout :: footer}"></div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <!-- AI Tips (when AI enabled and editing an existing visit) -->
    <th:block th:if="${aiEnabled and visit.id != 0}">
        <script src="https://cdn.jsdelivr.net/npm/sockjs-client@1/dist/sockjs.min.js"></script>
        <script src="https://cdn.jsdelivr.net/npm/@stomp/stompjs@7/bundles/stomp.umd.min.js"></script>
        <script th:src="@{/js/ai-chat.js}"></script>
        <script th:inline="javascript">
        (function () {
            const description = /*[[${visit.description}]]*/ '';
            const petName     = /*[[${visit.pet != null ? visit.pet.name : ''}]]*/ '';
            const petType     = /*[[${visit.pet != null and visit.pet.type != null ? visit.pet.type.name : ''}]]*/ '';

            let tipsSessionId = null;
            let tipsConnected = false;
            let responseText  = '';
            let responseDiv   = null;

            function loadAiTips() {
                const btn        = document.getElementById('aiTipsBtn');
                const resultDiv  = document.getElementById('aiTipsResult');

                if (btn) btn.style.display = 'none';
                resultDiv.style.display = '';
                resultDiv.innerHTML = '<span class="ai-tips-loading"><i class="bi bi-stars me-1"></i>Getting AI advice…</span>';

                const question = 'I have a vet appointment for ' + petName
                    + (petType ? ' (' + petType + ')' : '')
                    + (description ? ' with the following notes: ' + description : '')
                    + '. What tips or things should I watch out for during this visit?';

                function sendTip() {
                    tipsSessionId = AiChat.generateSessionId();
                    AiChat.sessionId = tipsSessionId;

                    // Prepare a minimal response div for streaming
                    resultDiv.innerHTML = '';
                    responseText = '';
                    responseDiv  = document.createElement('div');
                    responseDiv.className = 'ai-tips-content';
                    resultDiv.appendChild(responseDiv);

                    // Override render methods for inline tips (no chat bubbles)
                    const origToken    = AiChat.renderToken.bind(AiChat);
                    const origComplete = AiChat.renderComplete.bind(AiChat);
                    const origError    = AiChat.renderError.bind(AiChat);

                    AiChat.renderToken = function(token) {
                        responseText += token;
                        responseDiv.innerHTML = AiChat._markdownToHtml(responseText);
                    };
                    AiChat.renderComplete = function() {
                        if (!responseText) responseDiv.textContent = '(No response)';
                        else responseDiv.innerHTML = AiChat._markdownToHtml(responseText);
                        // Restore originals
                        AiChat.renderToken    = origToken;
                        AiChat.renderComplete = origComplete;
                        AiChat.renderError    = origError;
                        tipsConnected = false;
                        AiChat.disconnect();
                    };
                    AiChat.renderError = function(msg) {
                        responseDiv.innerHTML = '<span class="text-danger"><i class="bi bi-exclamation-triangle-fill me-1"></i>' + AiChat._escapeHtml(msg) + '</span>';
                        AiChat.renderToken    = origToken;
                        AiChat.renderComplete = origComplete;
                        AiChat.renderError    = origError;
                        tipsConnected = false;
                        AiChat.disconnect();
                    };

                    AiChat.stompClient.publish({
                        destination: '/app/chat.send',
                        body: JSON.stringify({
                            content:   question,
                            sessionId: tipsSessionId,
                            petId:     null
                        })
                    });
                }

                if (tipsConnected) {
                    sendTip();
                } else {
                    AiChat.connect(null,
                        function () { tipsConnected = true; sendTip(); },
                        function (err) {
                            resultDiv.innerHTML = '<span class="text-danger">Could not connect to AI: ' + err + '</span>';
                        }
                    );
                }
            }

            // Expose so onclick can reach it
            window.loadAiTips = loadAiTips;
        })();
        </script>
    </th:block>
</body>
</html>
