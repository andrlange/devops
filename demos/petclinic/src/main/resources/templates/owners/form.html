<!DOCTYPE html>
<html lang="en" data-bs-theme="dark" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${owner.id == 0 ? 'New Owner' : 'Edit Owner'} + ' | Petclinic'">Owner Form | Petclinic</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link th:href="@{/css/petclinic.css}" rel="stylesheet">
</head>
<body>
    <div th:replace="~{fragments/navbar :: navbar('owners')}"></div>

    <main class="container py-4">

        <!-- Page Header -->
        <div class="hero mb-4">
            <h1 th:text="${owner.id == 0 ? 'New Owner' : 'Edit Owner'}">New Owner</h1>
            <p class="mb-0" th:text="${owner.id == 0 ? 'Register a new pet owner.' : 'Update owner information.'}">Register a new pet owner.</p>
        </div>

        <!-- Form Card -->
        <div class="card">
            <div class="card-header">
                <i class="bi bi-person-plus me-2" th:if="${owner.id == 0}"></i>
                <i class="bi bi-pencil me-2" th:unless="${owner.id == 0}"></i>
                <span th:text="${owner.id == 0 ? 'Owner Details' : 'Edit Owner Details'}">Owner Details</span>
            </div>
            <div class="card-body">
                <form th:action="${owner.id == 0 ? '/owners/new' : '/owners/' + owner.id + '/edit'}"
                      th:object="${owner}" method="post">

                    <div class="row g-3">

                        <!-- First Name -->
                        <div class="col-md-6">
                            <label for="firstName" class="form-label">First Name</label>
                            <input type="text" class="form-control" id="firstName" th:field="*{firstName}"
                                   th:classappend="${#fields.hasErrors('firstName')} ? 'is-invalid'"
                                   placeholder="Enter first name">
                            <div class="invalid-feedback" th:if="${#fields.hasErrors('firstName')}" th:errors="*{firstName}">
                                First name is required.
                            </div>
                        </div>

                        <!-- Last Name -->
                        <div class="col-md-6">
                            <label for="lastName" class="form-label">Last Name</label>
                            <input type="text" class="form-control" id="lastName" th:field="*{lastName}"
                                   th:classappend="${#fields.hasErrors('lastName')} ? 'is-invalid'"
                                   placeholder="Enter last name">
                            <div class="invalid-feedback" th:if="${#fields.hasErrors('lastName')}" th:errors="*{lastName}">
                                Last name is required.
                            </div>
                        </div>

                        <!-- Address -->
                        <div class="col-12">
                            <label for="address" class="form-label">Address</label>
                            <input type="text" class="form-control" id="address" th:field="*{address}"
                                   th:classappend="${#fields.hasErrors('address')} ? 'is-invalid'"
                                   placeholder="Enter street address">
                            <div class="invalid-feedback" th:if="${#fields.hasErrors('address')}" th:errors="*{address}">
                                Address is required.
                            </div>
                        </div>

                        <!-- City -->
                        <div class="col-md-6">
                            <label for="city" class="form-label">City</label>
                            <input type="text" class="form-control" id="city" th:field="*{city}"
                                   th:classappend="${#fields.hasErrors('city')} ? 'is-invalid'"
                                   placeholder="Enter city">
                            <div class="invalid-feedback" th:if="${#fields.hasErrors('city')}" th:errors="*{city}">
                                City is required.
                            </div>
                        </div>

                        <!-- Telephone -->
                        <div class="col-md-6">
                            <label for="telephone" class="form-label">Telephone</label>
                            <input type="text" class="form-control" id="telephone" th:field="*{telephone}"
                                   th:classappend="${#fields.hasErrors('telephone')} ? 'is-invalid'"
                                   placeholder="Enter phone number">
                            <div class="invalid-feedback" th:if="${#fields.hasErrors('telephone')}" th:errors="*{telephone}">
                                Telephone is required.
                            </div>
                        </div>

                        <!-- Email -->
                        <div class="col-12">
                            <label for="email" class="form-label">Email</label>
                            <input type="email" class="form-control" id="email" th:field="*{email}"
                                   th:classappend="${#fields.hasErrors('email')} ? 'is-invalid'"
                                   placeholder="Enter email address">
                            <div class="invalid-feedback" th:if="${#fields.hasErrors('email')}" th:errors="*{email}">
                                Please enter a valid email address.
                            </div>
                        </div>

                    </div>

                    <!-- Actions -->
                    <div class="d-flex gap-2 mt-4">
                        <button type="submit" class="btn btn-primary">
                            <i class="bi bi-check-lg me-1"></i>
                            <span th:text="${owner.id == 0 ? 'Create Owner' : 'Save Changes'}">Create Owner</span>
                        </button>
                        <a th:href="${owner.id == 0 ? '/owners' : '/owners/' + owner.id}" class="btn btn-outline-secondary">
                            Cancel
                        </a>
                    </div>

                </form>
            </div>
        </div>

    </main>

    <div th:replace="~{fragments/layout :: footer}"></div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
