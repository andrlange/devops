<!DOCTYPE html>
<html lang="en" data-bs-theme="dark" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Chat | Petclinic</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link th:href="@{/css/petclinic.css}" rel="stylesheet">
</head>
<body>
    <div th:replace="~{fragments/navbar :: navbar('ai-chat')}"></div>

    <main class="container-fluid py-3 px-4">

        <div class="ai-chat-page-container">

            <!-- Left Sidebar -->
            <aside class="ai-chat-sidebar">

                <div class="mb-4">
                    <h6 class="text-uppercase mb-2" style="color: var(--spring-muted); font-size: 0.7rem; letter-spacing: 0.08em;">Topics</h6>
                    <button class="ai-topic-btn active"><i class="bi bi-heart-pulse me-2"></i>General Health</button>
                    <button class="ai-topic-btn"><i class="bi bi-egg-fried me-2"></i>Nutrition &amp; Diet</button>
                    <button class="ai-topic-btn"><i class="bi bi-shield-plus me-2"></i>Vaccinations</button>
                    <button class="ai-topic-btn"><i class="bi bi-exclamation-triangle me-2"></i>Emergency Help</button>
                    <button class="ai-topic-btn"><i class="bi bi-bandaid me-2"></i>Post-Visit Care</button>
                </div>

                <div>
                    <h6 class="text-uppercase mb-2" style="color: var(--spring-muted); font-size: 0.7rem; letter-spacing: 0.08em;">Quick Questions</h6>
                    <button class="ai-quick-question">My dog ate chocolate</button>
                    <button class="ai-quick-question">Cat won't eat</button>
                    <button class="ai-quick-question">Vaccination schedule</button>
                    <button class="ai-quick-question">Post-surgery care tips</button>
                </div>

            </aside>

            <!-- Right Chat Area -->
            <section class="ai-chat-main">

                <!-- Chat messages -->
                <div class="ai-chat-messages" id="chatMessages">

                    <!-- AI welcome message -->
                    <div class="ai-message ai-message-ai">
                        <div class="ai-avatar">
                            <i class="bi bi-robot"></i>
                        </div>
                        <div>
                            <div class="ai-message-bubble">
                                <strong>Petclinic AI Assistant</strong><br>
                                Hello! I'm your veterinary assistant. Ask me anything about your pet's health, nutrition, vaccinations, or care. How can I help you today?
                            </div>
                            <div class="mt-1 px-1" style="font-size: 0.7rem; color: var(--spring-muted);">
                                <i class="bi bi-info-circle me-1"></i>For emergencies, always contact your vet directly.
                            </div>
                        </div>
                    </div>

                </div>

                <!-- Input bar -->
                <div style="padding: 0.75rem 1rem; border-top: 1px solid var(--spring-border); background: var(--spring-card);">
                    <div class="d-flex align-items-center gap-1 mb-2">
                        <span class="ai-conn-status disconnected" id="connStatus"></span>
                        <small id="connLabel" style="color: var(--spring-muted); font-size: 0.7rem;">Connecting…</small>
                    </div>
                    <div class="d-flex gap-2">
                        <input type="text" class="form-control" id="chatInput"
                               placeholder="Ask about pet health, nutrition, vaccinations…"
                               autocomplete="off"
                               style="flex: 1;">
                        <button class="btn btn-primary" id="sendBtn">
                            <i class="bi bi-send"></i>
                        </button>
                    </div>
                </div>

            </section>

        </div>

    </main>

    <div th:replace="~{fragments/layout :: footer}"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sockjs-client@1/dist/sockjs.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@stomp/stompjs@7/bundles/stomp.umd.min.js"></script>
    <script th:src="@{/js/ai-chat.js}"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const chatContainer = document.getElementById('chatMessages');
            const chatInput = document.getElementById('chatInput');
            const sendBtn = document.getElementById('sendBtn');
            const connStatus = document.getElementById('connStatus');
            const connLabel = document.getElementById('connLabel');

            AiChat.connect(null, function() {
                connStatus.className = 'ai-conn-status connected';
                connLabel.textContent = 'Connected';
            }, function(err) {
                connStatus.className = 'ai-conn-status disconnected';
                connLabel.textContent = 'Disconnected';
            });

            // Set connecting state immediately
            connStatus.className = 'ai-conn-status connecting';
            connLabel.textContent = 'Connecting…';

            function sendMessage() {
                const content = chatInput.value.trim();
                if (!content) return;
                AiChat.sendMessage(content, null, chatContainer);
                chatInput.value = '';
            }

            sendBtn.addEventListener('click', sendMessage);
            chatInput.addEventListener('keydown', function(e) {
                if (e.key === 'Enter' && !e.shiftKey) {
                    e.preventDefault();
                    sendMessage();
                }
            });

            // Quick question buttons
            document.querySelectorAll('.ai-quick-question').forEach(btn => {
                btn.addEventListener('click', function() {
                    chatInput.value = this.textContent;
                    chatInput.focus();
                });
            });

            // Topic buttons — visual active state only
            document.querySelectorAll('.ai-topic-btn').forEach(btn => {
                btn.addEventListener('click', function() {
                    document.querySelectorAll('.ai-topic-btn').forEach(b => b.classList.remove('active'));
                    this.classList.add('active');
                });
            });
        });
    </script>
</body>
</html>
