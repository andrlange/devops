spring:
  datasource:
    url: jdbc:h2:mem:petclinic;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password:
    driver-class-name: org.h2.Driver
  h2:
    console:
      enabled: true
      path: /h2-console
  flyway:
    locations: classpath:db/migration-h2
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
